<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Epic Farms — Kiosko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --cream: #EEE7D6; --cream2: #E6DECA; --green: #0F3B2E;
  --terra: #B8602B; --line: rgba(15,59,46,0.12); --muted: rgba(15,59,46,0.45);
  --white: #FDFAF4;
}
html, body { background: var(--cream); color: var(--green); font-family: 'DM Sans', sans-serif; min-height: 100vh; overscroll-behavior: none; }

/* HEADER */
.header {
  background: var(--cream);
  border-bottom: 1px solid var(--line);
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(8px);
}
.header-logo { height: 38px; width: auto; opacity: 1; }
.header-right { text-align: right; }
.header-sede { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); display: block; }
.header-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--terra); }

/* AVISO */
.aviso-strip {
  background: var(--green);
  padding: 10px 20px;
  font-size: 12px;
  color: rgba(238,231,214,0.75);
  text-align: center;
  letter-spacing: 0.02em;
}
.aviso-strip span { color: var(--cream); font-weight: 600; }

/* FILTROS */
.filtros {
  display: flex;
  gap: 8px;
  padding: 14px 16px 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filtros::-webkit-scrollbar { display: none; }
.filtro {
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 99px;
  border: 1.5px solid var(--line);
  background: transparent;
  color: var(--green);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.filtro.activo { background: var(--green); color: var(--cream); border-color: var(--green); }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 6px 12px 100px;
}

/* CARD */
.card {
  background: var(--white);
  border-radius: 10px;
  border: 1px solid var(--line);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .12s;
}
.card:active { transform: scale(0.97); }

.card-icon-wrap {
  background: var(--cream2);
  height: 88px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.card-icon {
  width: 52px;
  height: 52px;
  opacity: 0.9;
}
.stock-pill {
  position: absolute;
  top: 8px; right: 8px;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 99px;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.stock-pill.ok   { background: rgba(15,59,46,.1);  color: #1A5C46; }
.stock-pill.bajo { background: rgba(184,96,43,.15); color: var(--terra); }
.stock-pill.sin  { background: rgba(153,60,29,.12); color: #993C1D; }

.card-body { padding: 11px 12px 8px; flex: 1; }
.card-cat {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  margin-bottom: 3px;
}
.card-nombre {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  line-height: 1.2;
  margin-bottom: 5px;
}
.card-precio { font-size: 16px; font-weight: 600; }
.card-precio-na { font-size: 13px; color: var(--muted); font-style: italic; }

.card-footer { padding: 8px 10px 10px; }
.btn-comprar {
  width: 100%;
  padding: 10px 0;
  border-radius: 6px;
  border: none;
  background: var(--terra);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: .02em;
  transition: opacity .15s;
}
.btn-comprar:active { opacity: .8; }
.btn-comprar:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }

/* BOTTOM SHEET */
.overlay {
  position: fixed; inset: 0;
  background: rgba(10,30,20,.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.overlay.activo { opacity: 1; pointer-events: all; }

.sheet {
  width: 100%;
  background: var(--cream);
  border-radius: 18px 18px 0 0;
  padding: 0 24px 44px;
  transform: translateY(20px);
  transition: transform .22s cubic-bezier(.32,.72,0,1);
}
.overlay.activo .sheet { transform: translateY(0); }

.sheet-handle { width: 32px; height: 3px; background: var(--line); border-radius: 99px; margin: 14px auto 0; }

.sheet-icon-wrap {
  width: 80px; height: 80px;
  background: var(--cream2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 18px auto 14px;
  border: 1px solid var(--line);
}
.sheet-icon { width: 44px; height: 44px; }

.sheet-cat { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 4px; }
.sheet-nombre { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; text-align: center; margin-bottom: 4px; }
.sheet-precio { font-size: 22px; font-weight: 600; color: var(--terra); text-align: center; margin-bottom: 20px; }

.sheet-aviso {
  font-size: 12px; color: var(--muted); line-height: 1.6;
  margin-bottom: 20px; padding: 10px 14px;
  background: var(--white); border-radius: 8px;
  border-left: 2px solid var(--terra);
}
.btn-pagar {
  width: 100%; padding: 15px; border-radius: 8px; border: none;
  background: var(--green); color: var(--cream);
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; margin-bottom: 10px; letter-spacing: .01em;
  transition: opacity .15s;
}
.btn-pagar:disabled { opacity: .4; }
.btn-cancelar {
  width: 100%; padding: 12px; border-radius: 8px;
  border: 1px solid var(--line); background: transparent;
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
}
.estado-modal { text-align: center; font-size: 12px; margin-top: 10px; color: var(--terra); min-height: 16px; }
.msg { grid-column: 1/-1; text-align: center; padding: 60px 20px; font-size: 14px; color: var(--muted); font-style: italic; }
</style>
</head>

function getIcon(nombre) {
  const n = nombre.toLowerCase();
  for (const [key, val] of Object.entries(ICONS)) {
    if (key !== 'default' && n.includes(key)) return val;
  }
  return ICONS.default;
}

const fmt = n => '$' + Number(n).toLocaleString('es-AR');
let productos = [], sel = null, cat = 'Todos';

function stockPill(s, m) {
  if (s <= 0) return '<span class="stock-pill sin">Sin stock</span>';
  if (s <= m) return `<span class="stock-pill bajo">Últimas ${s}</span>`;
  return `<span class="stock-pill ok">${s} disp.</span>`;
}

function renderFiltros() {
  const cats = ['Todos', ...new Set(productos.map(p => p.categoria))];
  document.getElementById('filtros').innerHTML = cats.map(c =>
    `<button class="filtro${c === cat ? ' activo' : ''}" onclick="filtrar('${c}')">${c}</button>`
  ).join('');
}

function renderGrid() {
  const lista = cat === 'Todos' ? productos : productos.filter(p => p.categoria === cat);
  const g = document.getElementById('grid');
  if (!lista.length) { g.innerHTML = '<p class="msg">Sin productos disponibles.</p>'; return; }
  g.innerHTML = lista.map(p => `
    <div class="card">
      <div class="card-icon-wrap">
        <img class="card-icon" src="${getIcon(p.nombre)}" alt="${p.nombre}">
        ${stockPill(p.stock, p.minimo)}
      </div>
      <div class="card-body">
        <p class="card-cat">${p.categoria}</p>
        <p class="card-nombre">${p.nombre}</p>
        ${p.precio > 0 ? `<p class="card-precio">${fmt(p.precio)}</p>` : '<p class="card-precio-na">Precio a confirmar</p>'}
      </div>
      <div class="card-footer">
        <button class="btn-comprar" onclick="abrirSheet(${p.id})" ${p.stock <= 0 ? 'disabled' : ''}>
          ${p.stock <= 0 ? 'Sin stock' : 'Comprar'}
        </button>
      </div>
    </div>`).join('');
}

function filtrar(c) { cat = c; renderFiltros(); renderGrid(); }

function abrirSheet(id) {
  sel = productos.find(p => p.id === id);
  if (!sel) return;
  document.getElementById('s-icon').src = getIcon(sel.nombre);
  document.getElementById('s-cat').textContent = sel.categoria;
  document.getElementById('s-nombre').textContent = sel.nombre;
  document.getElementById('s-precio').textContent = sel.precio > 0 ? fmt(sel.precio) : 'Precio a confirmar';
  document.getElementById('estado-modal').textContent = '';
  document.getElementById('btn-pagar').disabled = false;
  document.getElementById('btn-pagar').textContent = 'Confirmar y pagar';
  document.getElementById('overlay').classList.add('activo');
  document.body.style.overflow = 'hidden';
}

function cerrar() {
  document.getElementById('overlay').classList.remove('activo');
  document.body.style.overflow = '';
  sel = null;
}

document.getElementById('btn-cancelar').addEventListener('click', cerrar);
document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) cerrar(); });

document.getElementById('btn-pagar').addEventListener('click', () => {
  if (!sel) return;
  const btn = document.getElementById('btn-pagar');
  const est = document.getElementById('estado-modal');
  btn.disabled = true; btn.textContent = 'Registrando…'; est.textContent = '';
  const cb = 'cb_' + Date.now();
  const sc = document.createElement('script');
  sc.src = `${EXEC}?action=venta&producto=${encodeURIComponent(sel.nombre)}&cantidad=1&callback=${cb}`;
  window[cb] = function(data) {
    document.head.removeChild(sc); delete window[cb];
    if (!data.ok) {
      est.textContent = data.error === 'sin stock' ? 'Ya no hay stock disponible.' : 'Error. Avisá al staff.';
      btn.disabled = false; btn.textContent = 'Confirmar y pagar'; return;
    }
    window.location.href = sel.link_mp;
  };
  sc.onerror = () => { est.textContent = 'Error de conexión.'; btn.disabled = false; btn.textContent = 'Confirmar y pagar'; };
  document.head.appendChild(sc);
});

(function() {
  const cb = 'cb_menu';
  const sc = document.createElement('script');
  sc.src = `${EXEC}?action=menu&callback=${cb}`;
  window[cb] = function(data) {
    document.head.removeChild(sc); delete window[cb];
    if (!data.ok || !data.productos.length) { document.getElementById('grid').innerHTML = '<p class="msg">No hay productos.</p>'; return; }
    productos = data.productos; renderFiltros(); renderGrid();
  };
  sc.onerror = () => { document.getElementById('grid').innerHTML = '<p class="msg">Error de conexión.</p>'; };
  document.head.appendChild(sc);
})();
</script>
