<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Epic Farms — Kiosko Núñez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --cream:  #EEE7D6;
  --cream2: #E6DECA;
  --green:  #0F3B2E;
  --terra:  #B8602B;
  --line:   rgba(15,59,46,0.13);
  --muted:  rgba(15,59,46,0.45);
}

html, body {
  background: var(--cream);
  color: var(--green);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overscroll-behavior: none;
}

/* HEADER */
.header {
  background: var(--cream);
  border-bottom: 1px solid var(--line);
  padding: 18px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-brand {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--green);
}
.header-sede {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

/* SUBTÍTULO */
.subtitulo {
  padding: 12px 20px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--muted);
  border-bottom: 1px solid var(--line);
}

/* FILTROS */
.filtros {
  display: flex;
  gap: 8px;
  padding: 14px 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filtros::-webkit-scrollbar { display: none; }
.filtro {
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 99px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--green);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.filtro.activo {
  background: var(--green);
  color: var(--cream);
  border-color: var(--green);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  border-top: 1px solid var(--line);
  padding-bottom: 80px;
}

/* CARD */
.card {
  background: var(--cream);
  padding: 18px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: background 0.12s;
  cursor: pointer;
}
.card:active { background: var(--cream2); }

.card-cat {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}
.card-nombre {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.2;
  color: var(--green);
}
.card-bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-top: auto;
}
.card-precio {
  font-size: 16px;
  font-weight: 600;
  color: var(--green);
}
.card-precio-na {
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
}
.stock-txt {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
}
.stock-txt.bajo { color: var(--terra); font-weight: 600; }
.stock-txt.sin  { color: var(--terra); font-weight: 700; }

.btn-comprar {
  margin-top: 10px;
  width: 100%;
  padding: 11px;
  background: var(--terra);
  color: var(--cream);
  border: none;
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: opacity 0.15s;
}
.btn-comprar:active { opacity: 0.75; }
.btn-comprar:disabled {
  background: var(--line);
  color: var(--muted);
  cursor: not-allowed;
}

/* BOTTOM SHEET */
.overlay {
  position: fixed; inset: 0;
  background: rgba(15,59,46,0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.overlay.activo { opacity: 1; pointer-events: all; }

.sheet {
  width: 100%;
  background: var(--cream);
  border-radius: 16px 16px 0 0;
  padding: 0 24px 44px;
  transform: translateY(16px);
  transition: transform 0.22s cubic-bezier(0.32,0.72,0,1);
}
.overlay.activo .sheet { transform: translateY(0); }

.sheet-handle {
  width: 32px; height: 3px;
  background: var(--line);
  border-radius: 99px;
  margin: 14px auto 20px;
}
.sheet-cat {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.sheet-nombre {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 8px;
}
.sheet-precio {
  font-size: 22px;
  font-weight: 600;
  color: var(--terra);
  margin-bottom: 20px;
}
.sheet-nota {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 24px;
  padding-left: 10px;
  border-left: 2px solid var(--terra);
}
.btn-pagar {
  width: 100%;
  padding: 15px;
  background: var(--green);
  color: var(--cream);
  border: none;
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 10px;
  letter-spacing: 0.02em;
  transition: opacity 0.15s;
}
.btn-pagar:disabled { opacity: 0.4; }
.btn-cancelar {
  width: 100%;
  padding: 13px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--line);
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  cursor: pointer;
}
.estado-modal { text-align: center; font-size: 12px; margin-top: 10px; color: var(--terra); min-height: 16px; }

/* EMPTY */
.msg { grid-column: 1/-1; text-align: center; padding: 60px 20px; font-size: 14px; color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <span class="header-brand">epic farms®</span>
  <span class="header-sede">Núñez — Kiosko</span>
</div>

<p class="subtitulo">Pedí, pagá con Mercado Pago y retirás en caja</p>

<div class="filtros" id="filtros"></div>
<div class="grid" id="grid"><p class="msg">Cargando…</p></div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <p class="sheet-cat" id="s-cat"></p>
    <p class="sheet-nombre" id="s-nombre"></p>
    <p class="sheet-precio" id="s-precio"></p>
    <p class="sheet-nota">Al confirmar te redirigimos a Mercado Pago. Mostrá el comprobante en caja para retirar.</p>
    <button class="btn-pagar" id="btn-pagar">Confirmar y pagar</button>
    <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
    <p class="estado-modal" id="estado-modal"></p>
  </div>
</div>

<script>
const EXEC='https://script.google.com/macros/s/AKfycbzKDGa2b0ZORXwUuZRWq1LTLZKQybL3nh4Dh0O24S0EcJxJdHUurgCC0sgZNMvBNh0Y/exec';
const fmt=n=>'$'+Number(n).toLocaleString('es-AR');
let productos=[],sel=null,cat='Todos';

function stock(s,m){
  if(s<=0) return '<span class="stock-txt sin">Sin stock</span>';
  if(s<=m) return `<span class="stock-txt bajo">Últimas ${s}</span>`;
  return `<span class="stock-txt">${s} disponibles</span>`;
}

function renderFiltros(){
  const cats=['Todos',...new Set(productos.map(p=>p.categoria))];
  document.getElementById('filtros').innerHTML=cats.map(c=>`<button class="filtro${c===cat?' activo':''}" onclick="filtrar('${c}')">${c}</button>`).join('');
}

function renderGrid(){
  const lista=cat==='Todos'?productos:productos.filter(p=>p.categoria===cat);
  const g=document.getElementById('grid');
  if(!lista.length){g.innerHTML='<p class="msg">Sin productos disponibles.</p>';return;}
  g.innerHTML=lista.map(p=>`
    <div class="card">
      <span class="card-cat">${p.categoria}</span>
      <p class="card-nombre">${p.nombre}</p>
      <div class="card-bottom">
        ${p.precio>0?`<span class="card-precio">${fmt(p.precio)}</span>`:'<span class="card-precio-na">Precio a confirmar</span>'}
        ${stock(p.stock,p.minimo)}
      </div>
      <button class="btn-comprar" onclick="abrirSheet(${p.id})" ${p.stock<=0?'disabled':''}>
        ${p.stock<=0?'Sin stock':'Comprar'}
      </button>
    </div>`).join('');
}

function filtrar(c){cat=c;renderFiltros();renderGrid();}

function abrirSheet(id){
  sel=productos.find(p=>p.id===id);
  if(!sel)return;
  document.getElementById('s-cat').textContent=sel.categoria;
  document.getElementById('s-nombre').textContent=sel.nombre;
  document.getElementById('s-precio').textContent=sel.precio>0?fmt(sel.precio):'Precio a confirmar';
  document.getElementById('estado-modal').textContent='';
  document.getElementById('btn-pagar').disabled=false;
  document.getElementById('btn-pagar').textContent='Confirmar y pagar';
  document.getElementById('overlay').classList.add('activo');
  document.body.style.overflow='hidden';
}

function cerrar(){
  document.getElementById('overlay').classList.remove('activo');
  document.body.style.overflow='';
  sel=null;
}

document.getElementById('btn-cancelar').addEventListener('click',cerrar);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))cerrar();});

document.getElementById('btn-pagar').addEventListener('click',()=>{
  if(!sel)return;
  const btn=document.getElementById('btn-pagar');
  const est=document.getElementById('estado-modal');
  btn.disabled=true;btn.textContent='Registrando…';est.textContent='';
  const cb='cb_'+Date.now();
  const sc=document.createElement('script');
  sc.src=`${EXEC}?action=venta&producto=${encodeURIComponent(sel.nombre)}&cantidad=1&callback=${cb}`;
  window[cb]=function(data){
    document.head.removeChild(sc);delete window[cb];
    if(!data.ok){est.textContent=data.error==='sin stock'?'Ya no hay stock.':'Error. Avisá al staff.';btn.disabled=false;btn.textContent='Confirmar y pagar';return;}
    window.location.href=sel.link_mp;
  };
  sc.onerror=()=>{est.textContent='Error de conexión.';btn.disabled=false;btn.textContent='Confirmar y pagar';};
  document.head.appendChild(sc);
});

(function(){
  const cb='cb_menu';const sc=document.createElement('script');
  sc.src=`${EXEC}?action=menu&callback=${cb}`;
  window[cb]=function(data){
    document.head.removeChild(sc);delete window[cb];
    if(!data.ok||!data.productos.length){document.getElementById('grid').innerHTML='<p class="msg">No hay productos.</p>';return;}
    productos=data.productos;renderFiltros();renderGrid();
  };
  sc.onerror=()=>{document.getElementById('grid').innerHTML='<p class="msg">Error de conexión.</p>';};
  document.head.appendChild(sc);
})();
</script>
</body>
</html>
