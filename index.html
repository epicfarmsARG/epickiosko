<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Farms — Kiosko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #EEE7D6;
    --green: #0F3B2E;
    --terra: #B8602B;
    --line:  rgba(15,59,46,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    background-image: repeating-linear-gradient(135deg, rgba(15,59,46,0.025) 0px, rgba(15,59,46,0.025) 1px, transparent 1px, transparent 8px);
    color: var(--green);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* ── Header ── */
  header {
    background: var(--green);
    padding: 20px 20px 16px;
    text-align: center;
  }
  header .eyebrow {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(238,231,214,0.6); margin-bottom: 2px;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500; font-size: 26px; color: var(--cream);
  }

  /* ── Categorías ── */
  .cats {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 14px 16px; scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--terra);
    background: transparent; color: var(--terra); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .cat-btn.activo { background: var(--terra); color: var(--cream); }

  /* ── Grid productos ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; padding: 4px 16px;
  }

  /* ── Card ── */
  .card {
    background: #FBF8F0; border: 1px solid var(--line); border-radius: 6px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .card-body { padding: 14px 12px 10px; flex: 1; }
  .card-cat {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: rgba(15,59,46,0.45); margin-bottom: 4px;
  }
  .card-nombre {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 600; line-height: 1.2; margin-bottom: 8px;
  }
  .card-precio {
    font-size: 15px; font-weight: 600; color: var(--green);
  }
  .card-precio span { font-size: 11px; font-weight: 400; color: rgba(15,59,46,0.5); margin-left: 2px; }
  .stock-tag {
    font-size: 11px; margin-top: 5px;
    color: rgba(15,59,46,0.5);
  }
  .stock-tag.bajo { color: var(--terra); font-weight: 600; }
  .stock-tag.sin  { color: #993C1D; font-weight: 600; }

  .card-footer { padding: 0 12px 12px; }
  .btn-comprar {
    width: 100%; padding: 10px; border-radius: 4px; border: none;
    background: var(--terra); color: var(--cream);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-comprar:active { opacity: 0.75; }
  .btn-comprar:disabled { background: rgba(15,59,46,0.2); color: rgba(15,59,46,0.4); cursor: not-allowed; }

  /* ── Modal confirmación ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(15,59,46,0.55);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
  }
  .overlay.activo { opacity: 1; pointer-events: all; }
  .modal {
    background: #FBF8F0; border-radius: 12px 12px 0 0; padding: 28px 24px 36px;
    width: 100%; max-width: 440px;
    transform: translateY(30px); transition: transform 0.2s;
  }
  .overlay.activo .modal { transform: translateY(0); }
  .modal h2 {
    font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; margin-bottom: 6px;
  }
  .modal .sub { font-size: 14px; color: rgba(15,59,46,0.65); margin-bottom: 20px; }
  .modal .precio-modal { font-size: 28px; font-weight: 600; margin-bottom: 24px; }
  .modal .aviso { font-size: 12px; color: rgba(15,59,46,0.5); margin-bottom: 20px; line-height: 1.5; }
  .btn-pagar {
    width: 100%; padding: 15px; border-radius: 4px; border: none;
    background: var(--green); color: var(--cream);
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer;
    margin-bottom: 10px;
  }
  .btn-cancelar {
    width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--line);
    background: transparent; color: var(--green);
    font-family: 'Inter', sans-serif; font-size: 14px; cursor: pointer;
  }
  .estado-modal { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; color: var(--terra); }

  /* ── Cargando / error ── */
  .msg { text-align: center; padding: 60px 20px; font-size: 14px; color: rgba(15,59,46,0.5); }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Núñez</p>
  <h1>Epic Farms Kiosko</h1>
</header>

<div class="cats" id="cats"></div>
<div class="grid" id="grid"><p class="msg">Cargando menú…</p></div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="m-nombre">—</h2>
    <p class="sub" id="m-cat">—</p>
    <p class="precio-modal" id="m-precio">—</p>
    <p class="aviso">Al confirmar vas a ser redirigido a Mercado Pago para completar el pago. El stock se descuenta automáticamente.</p>
    <button class="btn-pagar" id="btn-pagar">Ir a pagar</button>
    <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
    <p class="estado-modal" id="estado-modal"></p>
  </div>
</div>

<script>
const EXEC = 'https://script.google.com/macros/s/AKfycbzKDGa2b0ZORXwUuZRWq1LTLZKQybL3nh4Dh0O24S0EcJxJdHUurgCC0sgZNMvBNh0Y/exec';

let productos = [];
let seleccionado = null;
let catActiva = 'Todos';

function fmt(n) { return '$' + Number(n).toLocaleString('es-AR'); }

function stockLabel(stock, minimo) {
  if (stock <= 0)      return '<span class="stock-tag sin">Sin stock</span>';
  if (stock <= minimo) return `<span class="stock-tag bajo">Últimas ${stock}</span>`;
  return `<span class="stock-tag">${stock} disponibles</span>`;
}

function renderCats() {
  const cats = ['Todos', ...new Set(productos.map(p => p.categoria))];
  const cont = document.getElementById('cats');
  cont.innerHTML = cats.map(c =>
    `<button class="cat-btn${c === catActiva ? ' activo' : ''}" onclick="filtrar('${c}')">${c}</button>`
  ).join('');
}

function renderGrid() {
  const lista = catActiva === 'Todos' ? productos : productos.filter(p => p.categoria === catActiva);
  const grid = document.getElementById('grid');
  if (lista.length === 0) { grid.innerHTML = '<p class="msg">No hay productos disponibles.</p>'; return; }
  grid.innerHTML = lista.map(p => `
    <div class="card">
      <div class="card-body">
        <p class="card-cat">${p.categoria}</p>
        <p class="card-nombre">${p.nombre}</p>
        <p class="card-precio">${p.precio > 0 ? fmt(p.precio) : '—'}<span>ARS</span></p>
        ${stockLabel(p.stock, p.minimo)}
      </div>
      <div class="card-footer">
        <button class="btn-comprar" onclick="abrirModal(${p.id})" ${p.stock <= 0 ? 'disabled' : ''}>
          ${p.stock <= 0 ? 'Sin stock' : 'Comprar'}
        </button>
      </div>
    </div>
  `).join('');
}

function filtrar(cat) {
  catActiva = cat;
  renderCats();
  renderGrid();
}

function abrirModal(id) {
  seleccionado = productos.find(p => p.id === id);
  if (!seleccionado) return;
  document.getElementById('m-nombre').textContent  = seleccionado.nombre;
  document.getElementById('m-cat').textContent     = seleccionado.categoria;
  document.getElementById('m-precio').textContent  = seleccionado.precio > 0 ? fmt(seleccionado.precio) : 'Precio a confirmar';
  document.getElementById('estado-modal').textContent = '';
  document.getElementById('btn-pagar').disabled = false;
  document.getElementById('overlay').classList.add('activo');
}

document.getElementById('btn-cancelar').addEventListener('click', () => {
  seleccionado = null;
  document.getElementById('overlay').classList.remove('activo');
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) {
    seleccionado = null;
    document.getElementById('overlay').classList.remove('activo');
  }
});

document.getElementById('btn-pagar').addEventListener('click', () => {
  if (!seleccionado) return;
  const btn = document.getElementById('btn-pagar');
  const estado = document.getElementById('estado-modal');
  btn.disabled = true;
  estado.textContent = 'Registrando venta…';

  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');
  script.src = `${EXEC}?action=venta&producto=${encodeURIComponent(seleccionado.nombre)}&cantidad=1&callback=${cbName}`;

  window[cbName] = function(data) {
    document.head.removeChild(script);
    delete window[cbName];
    if (!data.ok) {
      estado.textContent = data.error === 'sin stock' ? 'Sin stock disponible.' : 'No se pudo registrar. Avisale al staff.';
      btn.disabled = false;
      return;
    }
    // Venta registrada → ir a MP
    window.location.href = seleccionado.link_mp;
  };

  script.onerror = function() {
    estado.textContent = 'Error de conexión. Avisale al staff.';
    btn.disabled = false;
  };

  document.head.appendChild(script);
});

// ── Carga inicial ──
(function cargarMenu() {
  const cbName = 'cb_menu_' + Date.now();
  const script = document.createElement('script');
  script.src = `${EXEC}?action=menu&callback=${cbName}`;

  window[cbName] = function(data) {
    document.head.removeChild(script);
    delete window[cbName];
    if (!data.ok || !data.productos.length) {
      document.getElementById('grid').innerHTML = '<p class="msg">No hay productos disponibles.</p>';
      return;
    }
    productos = data.productos;
    renderCats();
    renderGrid();
  };

  script.onerror = function() {
    document.getElementById('grid').innerHTML = '<p class="msg">Error cargando el menú. Revisá tu conexión.</p>';
  };

  document.head.appendChild(script);
})();
</script>
</body>
</html>
