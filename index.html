<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Epic Farms — Kiosko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --cream: #EEE7D6;
  --cream2: #E4D9C6;
  --green: #0F3B2E;
  --terra: #B8602B;
  --line: rgba(15,59,46,0.1);
  --muted: rgba(15,59,46,0.4);
  --white: #FDFAF4;
}
html, body {
  background: var(--cream);
  color: var(--green);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overscroll-behavior: none;
}

/* HEADER */
.header {
  padding: 28px 24px 8px;
  background: var(--cream);
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 14px;
}
.header-title strong {
  font-style: normal;
  font-weight: 600;
  color: var(--green);
  font-size: 14px;
}

/* FILTROS */
.filtros {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}
.filtros::-webkit-scrollbar { display: none; }
.filtro {
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--green);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.filtro.activo {
  background: var(--green);
  color: var(--cream);
  border-color: var(--green);
}

/* LISTA */
.lista {
  padding: 0 0 120px;
}

/* ITEM */
.item {
  display: flex;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--line);
  gap: 16px;
  cursor: pointer;
  transition: background .1s;
  -webkit-user-select: none;
  user-select: none;
}
.item:active { background: var(--cream2); }
.item.agotado { opacity: 0.38; pointer-events: none; }

.item-info { flex: 1; min-width: 0; }
.item-cat {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--muted);
  margin-bottom: 3px;
}
.item-nombre {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-precio {
  font-size: 14px;
  font-weight: 500;
  color: var(--terra);
  margin-top: 4px;
}
.item-precio-na {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
}

/* BOTÓN + */
.item-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1.5px solid var(--terra);
  background: transparent;
  color: var(--terra);
  font-size: 22px;
  font-weight: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
  line-height: 1;
}
.item-btn:active {
  background: var(--terra);
  color: var(--cream);
  transform: scale(0.92);
}

/* SECTION LABEL */
.section-label {
  padding: 24px 24px 10px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.02em;
  background: var(--cream);
  display: flex;
  align-items: center;
  gap: 14px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1.5px;
  background: var(--terra);
  opacity: 0.35;
  border-radius: 99px;
}

/* BOTTOM SHEET */
.overlay {
  position: fixed; inset: 0;
  background: rgba(10,28,20,.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s;
}
.overlay.activo { opacity: 1; pointer-events: all; }

.sheet {
  width: 100%;
  background: var(--cream);
  border-radius: 20px 20px 0 0;
  padding: 0 28px 48px;
  transform: translateY(24px);
  transition: transform .24s cubic-bezier(.32,.72,0,1);
}
.overlay.activo .sheet { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 3px;
  background: var(--line);
  border-radius: 99px;
  margin: 16px auto 24px;
}

.sheet-cat {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--muted);
  margin-bottom: 4px;
}
.sheet-nombre {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  line-height: 1.1;
  margin-bottom: 8px;
}
.sheet-precio {
  font-size: 24px;
  font-weight: 600;
  color: var(--terra);
  margin-bottom: 28px;
}

/* CANTIDAD */
.cantidad-wrap {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 28px;
}
.cantidad-label {
  font-size: 13px;
  color: var(--muted);
  font-weight: 500;
}
.cantidad-ctrl {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-left: auto;
}
.cantidad-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  background: transparent;
  color: var(--green);
  font-size: 20px;
  font-weight: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .12s;
  line-height: 1;
}
.cantidad-btn:active { background: var(--green); color: var(--cream); }
.cantidad-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  min-width: 24px;
  text-align: center;
}

.sheet-total {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
  text-align: right;
}
.sheet-total strong {
  font-size: 16px;
  color: var(--green);
  font-weight: 600;
}

.btn-pagar {
  width: 100%;
  padding: 17px;
  border-radius: 10px;
  border: none;
  background: var(--green);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: .02em;
  margin-bottom: 12px;
  transition: opacity .15s;
}
.btn-pagar:disabled { opacity: .35; }

.btn-cancelar {
  width: 100%;
  padding: 13px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
}

.estado-modal {
  text-align: center;
  font-size: 12px;
  margin-top: 10px;
  color: var(--terra);
  min-height: 16px;
}

.msg {
  text-align: center;
  padding: 80px 24px;
  font-size: 15px;
  color: var(--muted);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
</style>
</head>
<body>

<div class="header">
  <p class="header-title"><strong>epic farms®</strong> &nbsp;·&nbsp; Kiosko Núñez</p>
  <div class="filtros" id="filtros"></div>
</div>

<div class="lista" id="lista">
  <p class="msg">Cargando…</p>
</div>

<!-- Bottom sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <p class="sheet-cat" id="s-cat"></p>
    <p class="sheet-nombre" id="s-nombre"></p>
    <p class="sheet-precio" id="s-precio"></p>
    <div class="cantidad-wrap">
      <span class="cantidad-label">Cantidad</span>
      <div class="cantidad-ctrl">
        <button class="cantidad-btn" id="btn-menos">−</button>
        <span class="cantidad-num" id="cantidad-num">1</span>
        <button class="cantidad-btn" id="btn-mas">+</button>
      </div>
    </div>
    <p class="sheet-total" id="sheet-total"></p>
    <button class="btn-pagar" id="btn-pagar">Ir a pagar</button>
    <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
    <p class="estado-modal" id="estado-modal"></p>
  </div>
</div>

<script>
const EXEC = 'https://script.google.com/macros/s/AKfycbzKDGa2b0ZORXwUuZRWq1LTLZKQybL3nh4Dh0O24S0EcJxJdHUurgCC0sgZNMvBNh0Y/exec';
const fmt = n => '$' + Number(n).toLocaleString('es-AR');
let productos = [], sel = null, cat = 'Todos', cantidad = 1;

function renderFiltros() {
  const cats = ['Todos', ...new Set(productos.map(p => p.categoria))];
  document.getElementById('filtros').innerHTML = cats.map(c =>
    `<button class="filtro${c === cat ? ' activo' : ''}" onclick="filtrar('${c}')">${c}</button>`
  ).join('');
}

function renderLista() {
  const lista = cat === 'Todos' ? productos : productos.filter(p => p.categoria === cat);
  const el = document.getElementById('lista');
  if (!lista.length) { el.innerHTML = '<p class="msg">Sin productos.</p>'; return; }

  // Agrupar por categoría
  const grupos = {};
  lista.forEach(p => {
    if (!grupos[p.categoria]) grupos[p.categoria] = [];
    grupos[p.categoria].push(p);
  });

  let html = '';
  Object.entries(grupos).forEach(([cat, items]) => {
    if (Object.keys(grupos).length >= 1) html += `<div class="section-label">${cat}</div>`;
    items.forEach(p => {
      const agotado = p.stock <= 0 ? 'agotado' : '';
      html += `<div class="item ${agotado}" onclick="abrirSheet(${p.id})">
        <div class="item-info">
          <p class="item-cat">${p.categoria}</p>
          <p class="item-nombre">${p.nombre}</p>
          ${p.precio > 0
            ? `<p class="item-precio">${fmt(p.precio)}</p>`
            : `<p class="item-precio-na">Precio a confirmar</p>`}
        </div>
        <button class="item-btn" onclick="event.stopPropagation();abrirSheet(${p.id})" ${agotado ? 'disabled' : ''}>+</button>
      </div>`;
    });
  });
  el.innerHTML = html;
}

function filtrar(c) { cat = c; renderFiltros(); renderLista(); }

function actualizarTotal() {
  const total = sel && sel.precio > 0 ? sel.precio * cantidad : null;
  document.getElementById('sheet-total').innerHTML = total
    ? `Total: <strong>${fmt(total)}</strong>`
    : '';
}

document.getElementById('btn-menos').addEventListener('click', () => {
  if (cantidad > 1) { cantidad--; document.getElementById('cantidad-num').textContent = cantidad; actualizarTotal(); }
});
document.getElementById('btn-mas').addEventListener('click', () => {
  const maxStock = sel ? sel.stock : 99;
  if (cantidad < Math.min(maxStock, 10)) { cantidad++; document.getElementById('cantidad-num').textContent = cantidad; actualizarTotal(); }
});

function abrirSheet(id) {
  sel = productos.find(p => p.id === id);
  if (!sel) return;
  cantidad = 1;
  document.getElementById('s-cat').textContent = sel.categoria;
  document.getElementById('s-nombre').textContent = sel.nombre;
  document.getElementById('s-precio').textContent = sel.precio > 0 ? fmt(sel.precio) : 'Precio a confirmar';
  document.getElementById('cantidad-num').textContent = '1';
  document.getElementById('estado-modal').textContent = '';
  document.getElementById('btn-pagar').disabled = false;
  document.getElementById('btn-pagar').textContent = 'Ir a pagar';
  actualizarTotal();
  document.getElementById('overlay').classList.add('activo');
  document.body.style.overflow = 'hidden';
}

function cerrar() {
  document.getElementById('overlay').classList.remove('activo');
  document.body.style.overflow = '';
  sel = null; cantidad = 1;
}

document.getElementById('btn-cancelar').addEventListener('click', cerrar);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) cerrar();
});

document.getElementById('btn-pagar').addEventListener('click', () => {
  if (!sel) return;
  const btn = document.getElementById('btn-pagar');
  const est = document.getElementById('estado-modal');
  btn.disabled = true; btn.textContent = 'Registrando…'; est.textContent = '';
  const cb = 'cb_' + Date.now();
  const sc = document.createElement('script');
  sc.src = `${EXEC}?action=venta&producto=${encodeURIComponent(sel.nombre)}&cantidad=${cantidad}&callback=${cb}`;
  window[cb] = function(data) {
    document.head.removeChild(sc); delete window[cb];
    if (!data.ok) {
      est.textContent = data.error === 'sin stock' ? 'Sin stock suficiente.' : 'Error. Avisá al staff.';
      btn.disabled = false; btn.textContent = 'Ir a pagar'; return;
    }
    window.location.href = sel.link_mp;
  };
  sc.onerror = () => { est.textContent = 'Error de conexión.'; btn.disabled = false; btn.textContent = 'Ir a pagar'; };
  document.head.appendChild(sc);
});

(function() {
  const cb = 'cb_menu';
  const sc = document.createElement('script');
  sc.src = `${EXEC}?action=menu&callback=${cb}`;
  window[cb] = function(data) {
    document.head.removeChild(sc); delete window[cb];
    if (!data.ok || !data.productos.length) { document.getElementById('lista').innerHTML = '<p class="msg">No hay productos.</p>'; return; }
    productos = data.productos; renderFiltros(); renderLista();
  };
  sc.onerror = () => { document.getElementById('lista').innerHTML = '<p class="msg">Error de conexión.</p>'; };
  document.head.appendChild(sc);
})();
</script>
</body>
</html>
