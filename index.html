<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Epic Farms · Núñez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green:      #0F3B2E;
    --green-dark: #0A2C22;
    --green-faded:#5A6F62;
    --cream:      #EEE7D6;
    --cream-warm: #E8DFC9;
    --terra:      #B8602B;
    --rule:       rgba(15,59,46,0.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--green);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 24px 56px;
  }
  /* Trama */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(15,59,46,0.025) 10px, rgba(15,59,46,0.025) 11px),
      repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(15,59,46,0.018) 10px, rgba(15,59,46,0.018) 11px);
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }

  /* ── LOGO / BRANDING ── */
  .brand { text-align: center; margin-bottom: 10px; }
  .brand-logo {
    font-family: 'Inter', sans-serif; font-weight: 800;
    font-size: clamp(42px, 11vw, 52px); line-height: 0.88;
    color: var(--green); letter-spacing: -0.03em;
  }
  .brand-logo .reg { font-size: 0.3em; vertical-align: super; font-weight: 700; }
  .brand-co {
    font-size: 11px; font-weight: 600; letter-spacing: 0.38em;
    color: var(--terra); text-transform: uppercase; margin-top: 8px;
  }
  .brand-sede {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 12px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--green-faded);
    background: var(--cream-warm); border: 1px solid var(--rule);
    padding: 6px 14px; border-radius: 999px;
  }
  .brand-sede .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--terra); }

  /* ── DIVIDER ── */
  .divider {
    width: 100%; height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--green) 30%, var(--green) 70%, transparent);
    margin: 28px 0 32px;
  }

  /* ── LINKS ── */
  .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }

  .link-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--cream-warm);
    border: 1.5px solid var(--rule);
    border-left: 4px solid var(--terra);
    border-radius: 14px;
    padding: 18px 20px;
    text-decoration: none; color: inherit;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .link-card:active {
    transform: scale(0.98);
    box-shadow: 0 2px 10px rgba(15,59,46,0.12);
  }
  .link-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--green); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .link-text { flex: 1; }
  .link-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700; color: var(--green); line-height: 1.1;
  }
  .link-desc {
    font-size: 11px; font-weight: 500; color: var(--green-faded);
    letter-spacing: 0.02em; margin-top: 3px; line-height: 1.4;
  }
  .link-arrow {
    font-size: 18px; color: var(--terra); flex-shrink: 0;
    font-weight: 700; opacity: 0.7;
  }

  /* ── TAGLINE ── */
  .tagline {
    margin-top: 40px; text-align: center;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 20px; font-weight: 600; color: var(--terra); opacity: 0.75;
  }
  .footer-text {
    margin-top: 8px; font-size: 10px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--green-faded); text-align: center;
  }
</style>
</head>
<body>
<div class="container">

  <div class="brand">
    <div class="brand-logo">epic farms<span class="reg">®</span></div>
    <div class="brand-co">Cannabis Co.</div>
    <div class="brand-sede"><span class="dot"></span> Núñez</div>
  </div>

  <div class="divider"></div>

  <div class="links">

    <a class="link-card" href="https://epicfarmsarg.github.io/epicfarms-nunez/" target="_blank">
      <div class="link-icon">🌿</div>
      <div class="link-text">
        <div class="link-title">Hacerme socio</div>
        <div class="link-desc">Formulario de ingreso · Sede Núñez</div>
      </div>
      <div class="link-arrow">›</div>
    </a>

    <a class="link-card" href="https://epicfarmsarg.github.io/epicfarms-menu/" target="_blank">
      <div class="link-icon">📋</div>
      <div class="link-text">
        <div class="link-title">Ver el menú</div>
        <div class="link-desc">Flores · Productos Epic · Precios actualizados</div>
      </div>
      <div class="link-arrow">›</div>
    </a>

    <a class="link-card" href="https://epicfarmsarg.github.io/epickiosko/" target="_blank">
      <div class="link-icon">💳</div>
      <div class="link-text">
        <div class="link-title">Kiosco · Mi saldo</div>
        <div class="link-desc">Consultá y cargá tu billetera Epic</div>
      </div>
      <div class="link-arrow">›</div>
    </a>

  </div>

  <div class="tagline">Ease of mind</div>
  <div class="footer-text">Solo socios · Epic Farms® Cannabis Co.</div>

</div>
</body>
</html>
