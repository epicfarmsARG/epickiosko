<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Epic Farms — Kiosko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --cream: #EEE7D6; --cream-dark: #E3D9C4; --green: #0F3B2E;
  --green-mid: #1A5C46; --terra: #B8602B; --terra-light: #D4743A;
  --white: #FDFAF4; --line: rgba(15,59,46,0.12);
}
html, body { background: var(--cream); color: var(--green); font-family: 'DM Sans', sans-serif; min-height: 100vh; overscroll-behavior: none; }

.header { background: var(--green); padding: 0 20px; position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; height: 58px; }
.header-logo { height: 28px; width: auto; object-fit: contain; }
.header-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: var(--terra-light); border: 1px solid var(--terra-light); border-radius: 20px; padding: 4px 10px; }

.hero { background: var(--green-mid); padding: 14px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid var(--terra); }
.hero-dot { width: 8px; height: 8px; background: var(--terra); border-radius: 50%; flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.8); } }
.hero-text { font-size: 13px; color: rgba(238,231,214,0.8); font-weight: 500; }

.filtros-wrap { padding: 14px 16px 6px; overflow-x: auto; scrollbar-width: none; display: flex; gap: 8px; }
.filtros-wrap::-webkit-scrollbar { display: none; }
.filtro { flex-shrink: 0; padding: 7px 16px; border-radius: 99px; border: 1.5px solid var(--line); background: transparent; color: var(--green); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
.filtro.activo { background: var(--green); color: var(--cream); border-color: var(--green); }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 12px 100px; }

.card { background: var(--white); border-radius: 10px; overflow: hidden; border: 1px solid var(--line); display: flex; flex-direction: column; position: relative; transition: transform .12s; }
.card:active { transform: scale(0.97); }
.card-top { background: var(--cream-dark); height: 90px; display: flex; align-items: center; justify-content: center; position: relative; }
.card-emoji { font-size: 42px; line-height: 1; }
.stock-pill { position: absolute; top: 8px; right: 8px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; letter-spacing: .04em; }
.stock-pill.ok { background: rgba(15,59,46,0.1); color: var(--green-mid); }
.stock-pill.bajo { background: rgba(184,96,43,0.15); color: var(--terra); }
.stock-pill.sin { background: rgba(153,60,29,0.12); color: #993C1D; }
.card-body { padding: 10px 10px 6px; flex: 1; }
.card-cat { font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: rgba(15,59,46,.4); margin-bottom: 3px; }
.card-nombre { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
.card-precio { font-size: 17px; font-weight: 600; color: var(--green); }
.card-precio-na { font-size: 13px; color: rgba(15,59,46,.35); font-style: italic; }
.card-footer { padding: 8px 10px 10px; }
.btn-comprar { width: 100%; padding: 10px 0; border-radius: 6px; border: none; background: var(--terra); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
.btn-comprar:disabled { background: var(--line); color: rgba(15,59,46,.35); cursor: not-allowed; }

.overlay { position: fixed; inset: 0; background: rgba(10,35,25,0.65); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .22s; }
.overlay.activo { opacity: 1; pointer-events: all; }
.sheet { background: var(--white); border-radius: 18px 18px 0 0; width: 100%; padding: 0 0 40px; transform: translateY(20px); transition: transform .22s cubic-bezier(.32,.72,0,1); }
.overlay.activo .sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--line); border-radius: 99px; margin: 14px auto 0; }
.sheet-producto-top { background: var(--cream-dark); margin: 16px 20px 0; border-radius: 10px; height: 110px; display: flex; align-items: center; justify-content: center; }
.sheet-emoji { font-size: 60px; }
.sheet-body { padding: 16px 20px 0; }
.sheet-cat { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; color: rgba(15,59,46,.45); margin-bottom: 4px; }
.sheet-nombre { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.sheet-precio { font-size: 28px; font-weight: 600; color: var(--terra); margin-bottom: 16px; }
.sheet-aviso { font-size: 12px; color: rgba(15,59,46,.5); line-height: 1.55; margin-bottom: 20px; padding: 10px 12px; background: var(--cream); border-radius: 8px; border-left: 3px solid var(--terra); }
.btn-ir-pagar { width: 100%; padding: 16px; border-radius: 10px; border: none; background: var(--green); color: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; letter-spacing: .01em; }
.btn-ir-pagar:disabled { background: var(--line); color: rgba(15,59,46,.4); }
.btn-cancelar { width: 100%; padding: 13px; border-radius: 10px; border: 1.5px solid var(--line); background: transparent; color: var(--green); font-family: 'DM Sans', sans-serif; font-size: 15px; cursor: pointer; }
.estado-modal { text-align: center; font-size: 13px; margin-top: 10px; min-height: 18px; color: var(--terra); }
.msg { grid-column: 1 / -1; text-align: center; padding: 60px 20px; font-size: 15px; color: rgba(15,59,46,.4); }
</style>
</head>

<div class="hero">
  <div class="hero-dot"></div>
  <span class="hero-text">Pedí, pagá con Mercado Pago y retirá en caja</span>
</div>
<div class="filtros-wrap" id="filtros"></div>
<div class="grid" id="grid"><p class="msg">Cargando…</p></div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-producto-top"><span class="sheet-emoji" id="s-emoji">🍺</span></div>
    <div class="sheet-body">
      <p class="sheet-cat" id="s-cat"></p>
      <p class="sheet-nombre" id="s-nombre"></p>
      <p class="sheet-precio" id="s-precio"></p>
      <p class="sheet-aviso">Al confirmar te redirigimos a Mercado Pago para pagar. Retirás en caja mostrando el comprobante.</p>
      <button class="btn-ir-pagar" id="btn-pagar">Ir a pagar →</button>
      <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
      <p class="estado-modal" id="estado-modal"></p>
    </div>
  </div>
</div>

<script>
const EXEC='https://script.google.com/macros/s/AKfycbzKDGa2b0ZORXwUuZRWq1LTLZKQybL3nh4Dh0O24S0EcJxJdHUurgCC0sgZNMvBNh0Y/exec';
const EMOJIS={'Stella Artois 330cc':'🍺','Heineken 330cc':'🍺','Corona 330cc':'🍺','Coca-Cola Zero lata':'🥤','Coca-Cola lata':'🥤','Schweppes lata':'🫧'};
const emo=n=>EMOJIS[n]||'🛍️';
const fmt=n=>'$'+Number(n).toLocaleString('es-AR');
let productos=[],seleccionado=null,catActiva='Todos';

function stockPill(s,m){
  if(s<=0) return '<span class="stock-pill sin">Sin stock</span>';
  if(s<=m) return `<span class="stock-pill bajo">Últimas ${s}</span>`;
  return `<span class="stock-pill ok">${s} disp.</span>`;
}
function renderFiltros(){
  const cats=['Todos',...new Set(productos.map(p=>p.categoria))];
  document.getElementById('filtros').innerHTML=cats.map(c=>`<button class="filtro${c===catActiva?' activo':''}" onclick="filtrar('${c}')">${c}</button>`).join('');
}
function renderGrid(){
  const lista=catActiva==='Todos'?productos:productos.filter(p=>p.categoria===catActiva);
  const g=document.getElementById('grid');
  if(!lista.length){g.innerHTML='<p class="msg">No hay productos.</p>';return;}
  g.innerHTML=lista.map(p=>`
    <div class="card">
      <div class="card-top"><span class="card-emoji">${emo(p.nombre)}</span>${stockPill(p.stock,p.minimo)}</div>
      <div class="card-body">
        <p class="card-cat">${p.categoria}</p>
        <p class="card-nombre">${p.nombre}</p>
        ${p.precio>0?`<p class="card-precio">${fmt(p.precio)}</p>`:`<p class="card-precio-na">Precio a confirmar</p>`}
      </div>
      <div class="card-footer">
        <button class="btn-comprar" onclick="abrirSheet(${p.id})" ${p.stock<=0?'disabled':''}>
          ${p.stock<=0?'Sin stock':'Comprar'}
        </button>
      </div>
    </div>`).join('');
}
function filtrar(c){catActiva=c;renderFiltros();renderGrid();}
function abrirSheet(id){
  seleccionado=productos.find(p=>p.id===id);
  if(!seleccionado)return;
  document.getElementById('s-emoji').textContent=emo(seleccionado.nombre);
  document.getElementById('s-cat').textContent=seleccionado.categoria;
  document.getElementById('s-nombre').textContent=seleccionado.nombre;
  document.getElementById('s-precio').textContent=seleccionado.precio>0?fmt(seleccionado.precio):'Precio a confirmar';
  document.getElementById('estado-modal').textContent='';
  document.getElementById('btn-pagar').disabled=false;
  document.getElementById('btn-pagar').textContent='Ir a pagar →';
  document.getElementById('overlay').classList.add('activo');
  document.body.style.overflow='hidden';
}
function cerrar(){
  document.getElementById('overlay').classList.remove('activo');
  document.body.style.overflow='';
  seleccionado=null;
}
document.getElementById('btn-cancelar').addEventListener('click',cerrar);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))cerrar();});
document.getElementById('btn-pagar').addEventListener('click',()=>{
  if(!seleccionado)return;
  const btn=document.getElementById('btn-pagar');
  const est=document.getElementById('estado-modal');
  btn.disabled=true; btn.textContent='Registrando…'; est.textContent='';
  const cb='cb_'+Date.now();
  const sc=document.createElement('script');
  sc.src=`${EXEC}?action=venta&producto=${encodeURIComponent(seleccionado.nombre)}&cantidad=1&callback=${cb}`;
  window[cb]=function(data){
    document.head.removeChild(sc); delete window[cb];
    if(!data.ok){est.textContent=data.error==='sin stock'?'Ya no hay stock.':'Error. Avisá al staff.';btn.disabled=false;btn.textContent='Ir a pagar →';return;}
    window.location.href=seleccionado.link_mp;
  };
  sc.onerror=()=>{est.textContent='Error de conexión.';btn.disabled=false;btn.textContent='Ir a pagar →';};
  document.head.appendChild(sc);
});
(function(){
  const cb='cb_menu';const sc=document.createElement('script');
  sc.src=`${EXEC}?action=menu&callback=${cb}`;
  window[cb]=function(data){
    document.head.removeChild(sc);delete window[cb];
    if(!data.ok||!data.productos.length){document.getElementById('grid').innerHTML='<p class="msg">No hay productos.</p>';return;}
    productos=data.productos;renderFiltros();renderGrid();
  };
  sc.onerror=()=>{document.getElementById('grid').innerHTML='<p class="msg">Error de conexión.</p>';};
  document.head.appendChild(sc);
})();
</script>
</body>
</html>
